<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoL Item Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>LoL Item Explorer</h1>
        <p id="version-display" class="version-text">Loading patch data...</p>
      </header>

      <div class="controls">
        <div class="control-group">
          <label>Map:</label>
          <div class="toggle-buttons" id="map-toggle">
            <button class="active" data-value="SR">Summoner's Rift</button>
            <button data-value="ARAM">ARAM</button>
          </div>
        </div>

        <div class="control-group">
          <label>Category:</label>
          <div class="toggle-buttons" id="category-toggle">
            <button class="active" data-value="Normal">Legendary/Epic</button>
            <button data-value="Boots">Boots</button>
          </div>
        </div>

        <div class="control-group search-sort">
          <input
            type="text"
            id="search-input"
            placeholder="Search item name..."
          />
        </div>

        <div class="control-group tag-group">
          <label>Tags: <button id="clear-tags" class="clear-btn" style="display:none">× Clear</button></label>
          <div id="tag-filter" class="tag-filter"></div>
        </div>

        <div class="control-group sort-group">
          <label>Sort by stat: <button id="clear-stats" class="clear-btn" style="display:none">× Clear</button></label>
          <div id="sort-icons" class="sort-icons"></div>
        </div>
      </div>

      <div id="items-grid" class="grid"></div>
    </div>

    <div id="build-panel" class="build-panel">
      <div class="build-header">
        <span class="build-title">Build (<span id="build-count">0</span>/6)</span>
        <div id="build-slots" class="build-slots"></div>
        <span id="build-total-gold" class="build-total-gold"></span>
        <button id="build-toggle-stats" class="clear-btn">Stats ▼</button>
        <button id="clear-build" class="clear-btn">× Clear</button>
      </div>
      <div id="build-stats-panel" class="build-stats-panel"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
