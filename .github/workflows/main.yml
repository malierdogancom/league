name: LoL Item Data Updater

on:
  schedule:
    # Çarşamba ve Perşembe günleri (Yama günleri) DDragon gecikmelerini yakalamak için her 4 saatte bir kontrol et
    - cron: "0 */4 * * 3,4"
    # Diğer günler herhangi bir acil düzeltme (hotfix) ihtimaline karşı günde 1 kez kontrol et
    - cron: "0 12 * * 0,1,2,5,6"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch and Process Data
        run: python scripts/update_data.py

      - name: Commit and Push new data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/
          git commit -m "Auto-update DDragon item data" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only hosting --project portfolio-mali-erdogan --non-interactive
